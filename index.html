<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Recover: Secure Prototype</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Space+Grotesk:wght@700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --neon-green: #22c55e;
            --neon-orange: #f59e0b; --sky-blue: #38bdf8; --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Lexend', 'Noto Sans Arabic', sans-serif; 
            background: var(--bg-dark); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 420px; }

        /* Header & Logo */
        .app-header { text-align: center; margin-bottom: 20px; }
        .logo-img { width: 75px; height: 75px; object-fit: contain; filter: drop-shadow(0 0 5px var(--neon-green)); }

        /* Identity Section */
        .id-section {
            background: rgba(56, 189, 248, 0.1); border: 1px dashed var(--sky-blue);
            padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: center;
        }
        .id-input {
            width: 85%; padding: 10px; border-radius: 10px; border: 1px solid #334155;
            background: var(--bg-dark); color: white; text-align: center; margin-top: 8px;
        }

        /* Impact Section */
        .impact-header {
            background: rgba(34, 197, 94, 0.1); border: 1px solid var(--neon-green);
            padding: 1rem; border-radius: 20px; margin-bottom: 1.5rem;
        }
        .impact-header h2 { margin: 0; font-size: 1rem; color: var(--neon-green); }
        .impact-header p { margin: 5px 0 0; font-size: 0.75rem; color: var(--text-dim); }

        /* Stats & Progress */
        .stats-card { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            padding: 1.2rem; border-radius: 24px; text-align: center; margin-bottom: 1rem;
        }
        #pointCount { font-family: 'Space Grotesk'; font-size: 3rem; font-weight: 800; display: block; }

        .progress-box { margin-bottom: 1.5rem; padding: 0 5px; }
        .progress-bg { background: #334155; height: 10px; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-fill { background: var(--sky-blue); height: 100%; width: 0%; transition: 0.8s; }

        /* Scanner */
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid var(--card-bg) !important; margin-bottom: 1.5rem; }

        /* Market */
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: var(--card-bg); padding: 12px; border-radius: 18px; text-align: center; }
        .image-container { width: 100%; height: 80px; background: #000; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .item-img { width: 100%; height: 100%; object-fit: cover; }
        .buy-btn { background: var(--neon-orange); border: none; color: var(--bg-dark); width: 100%; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* Language Buttons */
        .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .lang-btn { background: var(--card-bg); border: 1px solid #334155; color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
        .lang-btn.active { background: var(--neon-green); color: var(--bg-dark); font-weight: bold; }

        [dir="rtl"] .store-grid, [dir="rtl"] .impact-header, [dir="rtl"] .id-section { direction: rtl; text-align: right; }
        [dir="rtl"] .app-header { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <img src="logo.jpg" alt="Eco Logo" class="logo-img">
        <h1 style="font-size: 1.1rem; margin: 5px 0;">ECO-RECOVER</h1>
    </header>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('ar')">العربية</button>
    </div>

    <div class="id-section">
        <label id="label-id" style="font-size: 0.7rem; color: var(--sky-blue); font-weight: bold;">REGISTER BUYER ID</label>
        <input type="text" id="buyerIdInput" class="id-input" placeholder="Name or ID">
    </div>

    <div class="impact-header">
        <h2 id="impact-title">Earth Guard 🌳</h2>
        <p id="impact-text">Every scan cleans the planet.</p>
    </div>

    <div class="stats-card">
        <span id="pointCount">0</span>
        <small id="label-balance">CURRENT CREDITS</small>
    </div>

    <div class="progress-box">
        <div style="display: flex; justify-content: space-between; font-size: 0.65rem;">
            <span id="label-goal">Goal: Premium T-Shirt</span>
            <span id="goal-percent">0%</span>
        </div>
        <div class="progress-bg"><div class="progress-fill" id="p-bar"></div></div>
    </div>

    <div id="reader"></div>

    <h3 id="label-store" style="font-size: 0.9rem; margin-bottom: 10px;">MARKETPLACE</h3>
    <div class="store-grid">
        <div class="item-card">
            <div class="image-container"><img src="https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?w=200" class="item-img"></div>
            <strong id="item-pencil">Eco-Pencil</strong>
            <button class="buy-btn btn-txt" onclick="buyItem(30, 'pencil')">30 PTS</button>
        </div>
        <div class="item-card">
            <div class="image-container"><img src="https://images.unsplash.com/photo-1544816155-12df9643f363?w=200" class="item-img"></div>
            <strong id="item-bag">Eco-Bag</strong>
            <button class="buy-btn btn-txt" onclick="buyItem(350, 'bag')">350 PTS</button>
        </div>
    </div>
</div>

<script>
    let myPoints = 0;
    let scannedCodes = []; // SECURE LIST: Tracks used QR codes

    const translations = {
        en: { 
            impactT: "Earth Guard 🌳", impactD: "Every QR scan helps us save trees and clean our oceans.", 
            balance: "CURRENT CREDITS", store: "MARKETPLACE", goal: "Goal: Premium T-Shirt",
            pencil: "Eco-Pencil", bag: "Eco-Bag", idReq: "Please enter your ID first!",
            dupErr: "❌ Error: Already scanned!", success: "✅ +100 Points!", dir: "ltr" 
        },
        ar: { 
            impactT: "حارس الأرض 🌳", impactD: "كل مسح للرمز يساعدنا في إنقاذ الأشجار وتنظيف محيطاتنا.", 
            balance: "الرصيد الحالي", store: "المتجر", goal: "الهدف: قميص فاخر",
            pencil: "قلم خشبي", bag: "حقيبة بيئية", idReq: "الرجاء إدخال هويتك أولاً!",
            dupErr: "❌ خطأ: تم مسح هذا الرمز مسبقاً!", success: "✅ تم إضافة 100 نقطة!", dir: "rtl" 
        }
    };

    let currentLang = 'en';

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.body.dir = t.dir;
        document.getElementById('impact-title').innerText = t.impactT;
        document.getElementById('impact-text').innerText = t.impactD;
        document.getElementById('label-balance').innerText = t.balance;
        document.getElementById('label-store').innerText = t.store;
        document.getElementById('label-goal').innerText = t.goal;
        document.getElementById('item-pencil').innerText = t.pencil;
        document.getElementById('item-bag').innerText = t.bag;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function updateUI() {
        document.getElementById('pointCount').innerText = myPoints;
        let percent = Math.min((myPoints / 2000) * 100, 100);
        document.getElementById('p-bar').style.width = percent + "%";
        document.getElementById('goal-percent').innerText = Math.floor(percent) + "%";
    }

    function buyItem(cost, itemKey) {
        const bId = document.getElementById('buyerIdInput').value;
        if (!bId) { alert(translations[currentLang].idReq); return; }

        if (myPoints >= cost) {
            myPoints -= cost;
            updateUI();
            console.log("SALE:", { buyer: bId, item: itemKey, time: new Date().toISOString() });
            alert(`Purchase Successful for ID: ${bId}`);
        } else {
            alert("Not enough points!");
        }
    }

    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
        // SECURITY CHECK
        if (scannedCodes.includes(decodedText)) {
            alert(translations[currentLang].dupErr);
        } else {
            myPoints += 100;
            scannedCodes.push(decodedText); // Lock this code
            updateUI();
            alert(translations[currentLang].success);
        }
    }).catch(()=>{});

    setLang('en');
</script>

</body>
</html>
